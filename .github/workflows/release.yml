name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    if: "!endsWith(github.ref_name, '-pre')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DALAMUD_HOME: /tmp/dalamud
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ECommons
        uses: actions/checkout@v4
        with:
          repository: NightmareXIV/ECommons
          path: external/ECommons

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        run: |
          wget https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -O /tmp/dalamud.zip
          unzip /tmp/dalamud.zip -d ${{ env.DALAMUD_HOME }}

      - name: Build package
        run: scripts/package-release.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/XelsCombatAI.zip
