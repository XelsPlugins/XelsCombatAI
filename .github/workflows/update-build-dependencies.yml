name: Update Build Dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-build-dependencies
  cancel-in-progress: false

jobs:
  update-build-dependencies:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: bash
        run: |
          mkdir -p "$DALAMUD_HOME"
          curl -fsSL "https://goatcorp.github.io/dalamud-distrib/latest.zip" -o /tmp/dalamud.zip
          unzip -q -o /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Update dependency pointers
        run: scripts/update-build-dependencies.sh

      - name: Detect dependency changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet --exit-code -- third_party/BossmodReborn third_party/ECommons; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates were found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --submodule=log -- third_party/BossmodReborn third_party/ECommons
          fi

      - name: Validate updated dependencies
        if: steps.changes.outputs.changed == 'true'
        run: scripts/test-and-build.sh

      - name: Commit dependency pointers
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add third_party/BossmodReborn third_party/ECommons
          git commit -m "chore: update build dependencies"
          git push origin HEAD:main
